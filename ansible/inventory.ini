# Generated by Terraform output or filled manually.
# Replace the IP addresses with your actual server IPs.
#
# Usage: ansible-playbook -i ansible/inventory.ini ansible/site.yml

[master]
MASTER_IP ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/eventsphere.pem

[workers]
WORKER1_IP ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/eventsphere.pem
WORKER2_IP ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/eventsphere.pem

[all:vars]
ansible_python_interpreter=/usr/bin/python3
