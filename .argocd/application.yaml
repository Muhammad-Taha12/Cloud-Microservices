apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: eventsphere
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Muhammad-Taha12/Cloud-Microservices.git
    targetRevision: master
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: onlineeventbooking
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true