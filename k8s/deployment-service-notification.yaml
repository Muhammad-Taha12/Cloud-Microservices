apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service-deployment
  namespace: OnlineEventBookingMuhammadTaha
  labels:
    app: Notifications
spec:
  replicas: 2
  selector:
    matchLabels:
      app: Notifications
  template:
    metadata:
      labels:
        app: Notifications
    spec:
      containers:
      - name: Notifications
        image: Notifications:latest
        ports:
        - containerPort: 5003
        env:
          - name: PORT
            value: "5003"
          # FIX: Pass RabbitMQ URL via config (was hardcoded localhost in code)
          - name: RABBITMQ_URL
            valueFrom:
              configMapKeyRef:
                name: eventsphere-config
                key: RABBITMQ_URL
        resources:
          requests:
            cpu: "250m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: OnlineEventBookingMuhammadTaha
spec:
  selector:
    app: Notifications
  ports:
    - protocol: TCP
      port: 5003
      targetPort: 5003
  type: ClusterIP
